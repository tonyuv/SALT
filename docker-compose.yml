version: "3.9"

services:
  # ── MQTT Broker ───────────────────────────────────────────────────────────────
  emqx:
    image: emqx/emqx:5.5.1
    container_name: salt-emqx
    ports:
      - "1883:1883"
      - "18083:18083"
    environment:
      EMQX_NAME: salt-emqx
      EMQX_LOADED_PLUGINS: "emqx_dashboard"
    healthcheck:
      test: ["CMD-SHELL", "emqx_ctl status | grep -q 'is started'"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 15s
    restart: unless-stopped

  # ── Zookeeper (Kafka dependency) ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: salt-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q 'Zookeeper version'"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 15s
    restart: unless-stopped

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: salt-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  # ── BMDoubleYou Fleet Simulator (25 vehicles x 10 sensors = 250 streams) ────
  fleet-simulator:
    build:
      context: ./sensors
    container_name: salt-fleet-simulator
    command: ["python", "-u", "fleet_simulator.py"]
    depends_on:
      emqx:
        condition: service_healthy
    restart: unless-stopped

  # ── MQTT-to-Kafka Bridge ──────────────────────────────────────────────────────
  mqtt-kafka-bridge:
    build:
      context: ./bridge
    container_name: salt-mqtt-kafka-bridge
    depends_on:
      emqx:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Health-Check Agent ────────────────────────────────────────────────────────
  healthcheck-agent:
    build:
      context: ./healthcheck
    container_name: salt-healthcheck-agent
    command: ["python", "-u", "agent.py"]
    depends_on:
      emqx:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Web Dashboard ─────────────────────────────────────────────────────────────
  web-dashboard:
    build:
      context: ./dashboard
    container_name: salt-web-dashboard
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
